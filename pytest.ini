[pytest]
minversion = 8.0
testpaths = tb
addopts =
    -q
    --maxfail=1
    --disable-warnings
    --strict-markers
    --html=build/reports/pytest/report.html
    --self-contained-html
    --junitxml=build/reports/pytest/junit.xml
    --cov=model --cov=tb --cov-branch
    --cov-report=term
    --cov-report=html:build/reports/python_cov
markers =
    sw: software-only tests (model vs library)
    hw: hardware/cocotb tests (requires Verilator)
filterwarnings =
    ignore:The 'units' argument has been renamed to 'unit'.*:DeprecationWarning