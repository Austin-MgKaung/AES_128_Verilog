name: CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Verible linter
        uses: chipsalliance/verible-linter-action@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          paths: |
            rtl
            tb
          extensions: |
            .sv
            .svh
            .v
            .vh
          config_file: ".rules.verible_lint"
          extra_args: "--waiver_files=.verible.waiver --parse_fatal=true --lint_fatal=true"

  tests-sw:
    runs-on: ubuntu-latest
    needs: lint
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt

      - name: Run software AES model tests (test_model_vs_lib)
        run: |
          mkdir -p build
          python -m pytest -vv -rA tb/test_model_vs_lib.py

      - name: Upload Python coverage + reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-and-reports
          path: |
            build/reports/pytest/**
            build/reports/python_cov/**
          if-no-files-found: ignore

  tests-hw:
    runs-on: ubuntu-latest
    needs: tests-sw
    env:
      SIM: verilator           # cocotb-test / conftest use this
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Verilator 5.x
        uses: veryl-lang/setup-verilator@v1
        with:
          version: "5.038"     # or "latest"

      - name: Show tool versions
        run: |
          verilator --version
          python -V
          pip -V

      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y make lcov

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt

      - name: Run RTL tests (test_aes via test_build_aes.py)
        run: |
          mkdir -p build
          python -m pytest -vv -rA tb/test_build_aes.py

      - name: Run scoreboard/coverage tests (test_aes_scoreboard via test_build_aes_scoreboard.py)
        run: |
          python -m pytest -vv -rA tb/test_build_aes_scoreboard.py

      - name: Collect Verilator coverage (lcov)
        if: always()
        run: |
          mkdir -p build
          COV_FILE=""
          # Prefer explicit coverage outputs from your wrappers
          if [ -f build/coverage_rtl.dat ]; then
            COV_FILE="build/coverage_rtl.dat"
          elif [ -f build/sim_scoreboard/coverage_scoreboard.dat ]; then
            COV_FILE="build/sim_scoreboard/coverage_scoreboard.dat"
          elif [ -f sim_build/coverage.dat ]; then
            # Fallback to cocotb-test default
            COV_FILE="sim_build/coverage.dat"
          fi

          if [ -n "$COV_FILE" ]; then
            echo "Using Verilator coverage file: $COV_FILE"
            verilator_coverage --write-info build/coverage.info "$COV_FILE"
            genhtml -o build/cov_html build/coverage.info --branch-coverage
          else
            echo "No Verilator coverage .dat file found; skipping lcov export."
          fi

      - name: Upload simulation artifacts (waves & coverage)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sim-artifacts
          path: |
            sim_build/**
            build/**/coverage.info
            build/**/cov_html/**
            build/sim_aes_verilator/**
            build/sim_scoreboard/**
            **/*.vcd
            **/*.fst
          if-no-files-found: warn
